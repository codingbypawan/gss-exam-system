<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS Examination System - Marks Entry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Marks Entry</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Progress Info -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="alert alert-info d-flex justify-content-between align-items-center">
                    <div>
                        <strong id="examTitle"></strong> | <strong id="classTitle"></strong> | <strong id="subjectTitle"></strong>
                    </div>
                    <small id="progressText" class="text-muted"></small>
                </div>
            </div>
        </div>

        <!-- Student Form -->
        <div class="row">
            <div class="col-12 col-md-8 mx-auto">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <form id="marksForm">
                            <div class="row mb-3 align-items-center">
                                <div class="col-md-6">
                                    <p class="mb-0"><strong>Name:</strong> <span id="studentName"></span></p>
                                </div>
                                <div class="col-md-6">
                                    <p class="mb-0"><strong>Roll:</strong> <span id="rollNo"></span></p>
                                </div>
                            </div>

                            <hr class="my-4">

                            <h6 class="fw-bold mb-3">Subject Marks</h6>
                            <div id="subjectsContainer"></div>

                            <hr class="my-4">

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <button type="button" class="btn btn-outline-secondary" id="prevBtn" 
                                        onclick="previousStudent()">
                                    ← Previous Student
                                </button>
                                <button type="submit" class="btn btn-success">
                                    💾 Save & Next →
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/marks-entry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
