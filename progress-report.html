<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS - Progress Report 2025-26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== Progress Report Screen Styles ===== */
        .report-card {
            position: relative;
            max-width: 210mm;
            min-height: 290mm;
            margin: 0 auto 30px;
            background: #fff;
            border: 2px solid #333;
            padding: 24px 32px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 15px;
            color: #000;
            overflow: hidden;
        }

        /* Watermark */
        .report-card .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 320px;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }

        .report-card > *:not(.watermark) {
            position: relative;
            z-index: 1;
        }

        /* School header with logo */
        .report-card .school-header {
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 8px;
        }

        .report-card .school-header .school-logo {
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            object-fit: contain;
        }

        .report-card .school-header .school-text {
            flex: 1;
            text-align: center;
        }

        .report-card .school-header h2 {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .report-card .school-header .school-address {
            font-size: 15px;
            margin: 2px 0;
        }

        .report-card .school-header .school-contact {
            font-size: 12px;
            color: #444;
        }

        .report-card .report-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            border: 1px solid #333;
            padding: 6px;
            margin: 10px 0;
            background: #f0f0f0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Student info - 2 columns, 3 rows */
        .report-card .student-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 24px;
            font-size: 17px;
            margin-bottom: 20px;
            padding: 12px 0 14px;
            border-bottom: 1px solid #999;
        }

        .report-card .student-info .info-item {
            display: flex;
            gap: 6px;
        }

        .report-card .student-info .info-label {
            font-weight: 700;
            white-space: nowrap;
        }

        .report-card .student-info .info-value {
            border-bottom: 1px dotted #999;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Marks Table */
        .report-card .marks-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            margin-bottom: 36px;
        }

        .report-card .marks-table th,
        .report-card .marks-table td {
            border: 1px solid #333;
            padding: 7px 8px;
            text-align: center;
        }

        .report-card .marks-table th {
            background: #e8e8e8;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
        }

        .report-card .marks-table td.subject-name {
            text-align: left;
            font-weight: 600;
        }

        .report-card .marks-table tfoot td {
            font-weight: 700;
        }

        /* Result / Total Section */
        .report-card .result-section {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            border: 2px solid #333;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .report-card .result-section .result-box {
            flex: 1;
            text-align: center;
            padding: 10px 12px;
            border-right: 1px solid #333;
        }

        .report-card .result-section .result-box:last-child {
            border-right: none;
        }

        .report-card .result-section .result-box .result-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 4px;
        }

        .report-card .result-section .result-box .result-value {
            font-size: 22px;
            line-height: 1.2;
        }

        .report-card .result-section .result-box .result-value.passed {
            color: #198754;
        }

        .report-card .result-section .result-box .result-value.failed {
            color: #dc3545;
        }

        .report-card .result-section .result-box .result-value.rank-value {
            font-size: 24px;
            font-weight: 800;
        }

        /* Signatures */
        .report-card .signature-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 50px;
            padding-top: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .report-card .signature-section .sig-box {
            text-align: center;
            width: 30%;
        }

        .report-card .signature-section .sig-line {
            border-top: 1px solid #333;
            padding-top: 5px;
        }

        /* Controls (hidden on print) */
        .report-controls {
            max-width: 210mm;
            margin: 20px auto;
        }

        /* Page break between students */
        .page-break {
            page-break-after: always;
            break-after: page;
        }

        /* ===== A4 Print Styles ===== */
        @media print {
            @page {
                size: A4 portrait;
                margin: 8mm;
            }

            body {
                background: white !important;
                margin: 0;
                padding: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .no-print,
            .navbar,
            .report-controls {
                display: none !important;
            }

            .container-fluid {
                padding: 0 !important;
                max-width: 100% !important;
            }

            .report-card {
                border: 2px solid #333 !important;
                padding: 20px 24px;
                max-width: 100%;
                margin: 0;
                box-shadow: none;
                min-height: auto;
            }

            .report-card .watermark {
                opacity: 0.05 !important;
            }

            .report-card .marks-table th {
                background: #e8e8e8 !important;
            }

            .report-card .report-title {
                background: #f0f0f0 !important;
            }

            .report-card .result-section .result-box .result-value.passed {
                color: #198754 !important;
            }

            .report-card .result-section .result-box .result-value.failed {
                color: #dc3545 !important;
            }

            .page-break {
                page-break-after: always;
                break-after: page;
            }

            .report-card:last-child {
                page-break-after: auto;
                break-after: auto;
            }

            * {
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary no-print">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Progress Report</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Controls -->
        <div class="report-controls no-print">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="row align-items-end g-3">
                        <div class="col-md-4">
                            <label for="reportClassSelect" class="form-label fw-bold">Select Class</label>
                            <select class="form-select" id="reportClassSelect">
                                <option value="">-- Choose Class --</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="reportStudentSelect" class="form-label fw-bold">Student</label>
                            <select class="form-select" id="reportStudentSelect" disabled>
                                <option value="">-- All Students --</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary w-100" id="generateBtn" onclick="generateReport()">
                                Generate
                            </button>
                        </div>
                        <div class="col-md-3 text-end">
                            <button class="btn btn-success" id="printBtn" onclick="window.print()" disabled>
                                &#x1F5A8; Print All
                            </button>
                        </div>
                    </div>
                    <div class="mt-2">
                        <small class="text-muted" id="statusText">Select a class to generate progress reports.</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reports Container -->
        <div id="reportsContainer"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/progress-report.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
