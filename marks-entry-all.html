<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS Examination System - Marks Entry (All Students)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .student-row {
            border-bottom: 1px solid #dee2e6;
            padding: 10px 0;
        }
        .student-row:last-child {
            border-bottom: none;
        }
        .marks-input {
            max-width: 120px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .student-name {
            font-weight: 500;
        }
        .roll-no {
            font-weight: bold;
            color: #0d6efd;
        }
        .save-container {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 15px 0;
            border-top: 2px solid #0d6efd;
            z-index: 10;
        }
        .absent-btn {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Marks Entry - All Students</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Info Banner -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="alert alert-info d-flex justify-content-between align-items-center mb-0">
                    <div>
                        <strong id="examTitle"></strong> | <strong id="classTitle"></strong> | <strong id="subjectTitle"></strong>
                    </div>
                    <span id="maxMarksInfo" class="badge bg-primary fs-6"></span>
                </div>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Loading students...</p>
        </div>

        <!-- All Students Form -->
        <div id="mainContent" style="display:none;">
            <form id="marksForm">
                <div class="row">
                    <div class="col-12 col-lg-10 mx-auto">
                        <div class="card shadow">
                            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                                <strong>Total Students: <span id="totalStudents">0</span></strong>
                                <small class="text-muted">Enter marks or click Absent (-1)</small>
                            </div>
                            <div class="card-body p-2 p-md-3">
                                <!-- Table Header -->
                                <div class="row fw-bold text-center bg-primary text-white py-2 rounded-top d-none d-md-flex mb-1">
                                    <div class="col-md-1">Roll</div>
                                    <div class="col-md-5 text-start">Name</div>
                                    <div class="col-md-3">Marks</div>
                                    <div class="col-md-3">Action</div>
                                </div>

                                <!-- Student Rows Container -->
                                <div id="studentsContainer"></div>
                            </div>
                        </div>

                        <!-- Sticky Save Button -->
                        <div class="save-container">
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg" id="saveBtn">
                                    💾 Save All Marks
                                </button>
                            </div>
                            <div id="saveStatus" class="text-center mt-2" style="display:none;"></div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/marks-entry-all.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
