<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS Examination System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
        <div class="login-container">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h1 class="card-title text-primary mb-2">GSS Examination System</h1>
                        <p class="text-muted">Half Yearly & Yearly Exams</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="mobileNo" class="form-label fw-bold">Mobile Number</label>
                            <input type="tel" class="form-control form-control-lg" id="mobileNo" 
                                   placeholder="Enter 10-digit mobile number" maxlength="10" 
                                   pattern="[0-9]{10}" required>
                            <small class="text-muted">Format: 10 digits (e.g., 9919199848)</small>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" 
                                   placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>

                    <div id="errorMsg" class="alert alert-danger alert-dismissible fade hide" role="alert">
                        <span id="errorText"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <div class="text-center mt-4 border-top pt-3">
                        <p class="text-muted small mb-0">Admin Account</p>
                        <p class="text-muted small">
                            Mobile: <code>9919199848</code> | Password: <code>password123</code>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', handleLogin);
    </script>
</body>
</html>
