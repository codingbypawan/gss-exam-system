<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS Examination System - View Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">View Marks</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Header Info -->
        <div class="row mb-3">
            <div class="col-12">
                <div class="alert alert-info">
                    <strong id="examTitle"></strong> | <strong id="classTitle"></strong>
                </div>
            </div>
        </div>

        <!-- Search/Filter & Actions -->
        <div class="row mb-3 no-print">
            <div class="col-12 col-lg-6 mx-auto">
                <input type="text" class="form-control form-control-lg" id="searchInput" 
                       placeholder="Search by name or roll...">
            </div>
        </div>
        <div class="row mb-3 no-print">
            <div class="col-12 d-flex justify-content-end gap-2">
                <button class="btn btn-outline-primary" id="sortRankBtn" onclick="toggleSortByMarks()">
                    &#x25B2;&#x25BC; Sort by Marks &amp; Rank
                </button>
                <button class="btn btn-outline-success" onclick="printMarks()">
                    &#x1F5A8; Print
                </button>
            </div>
        </div>

        <!-- Print Header (visible only when printing) -->
        <div id="printHeader" class="print-only text-center mb-3">
            <h4 class="mb-1" id="printSchoolName">GSS Examination System</h4>
            <h5 class="mb-1" id="printExamTitle"></h5>
            <h6 id="printClassTitle"></h6>
        </div>

        <!-- Marks Table -->
        <div class="row">
            <div class="col-12">
                <div class="table-responsive">
                    <table class="table table-striped table-hover table-sm" id="marksTable">
                        <thead class="table-primary">
                            <tr class="header-row-1">
                                <th>Roll</th>
                                <th>Name</th>
                                <th id="marksHeaderColSpan" colSpan="8" class="text-center">Marks</th>
                                <th>Total</th>
                                <th id="rankColHeader1" style="display:none;">Rank</th>
                            </tr>
                            <tr class="header-row-2">
                                <th></th>
                                <th></th>
                                <th class="text-center">S1</th>
                                <th class="text-center">S2</th>
                                <th class="text-center">S3</th>
                                <th class="text-center">S4</th>
                                <th class="text-center">S5</th>
                                <th class="text-center">S6</th>
                                <th class="text-center" id="s7Header">S7</th>
                                <th class="text-center" id="s8Header">S8</th>
                                <th class="text-center fw-bold" id="totalHeader">Total</th>
                                <th class="text-center fw-bold" id="rankColHeader2" style="display:none;">Rank</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colSpan="11" class="text-center text-muted">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/view-marks.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
