<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSS Examination System - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">GSS Examination System</span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link">Welcome, <strong id="userName"></strong></span>
                    </li>
                    <li class="nav-item" id="adminLinkContainer" style="display:none;">
                        <a class="nav-link" href="admin.html">🔧 Admin Panel</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-5">
        <div class="row">
            <div class="col-12 col-md-6 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Marks Entry</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="dashboardForm">
                            <div class="mb-3">
                                <label for="examSelect" class="form-label fw-bold">Select Exam</label>
                                <select class="form-select form-select-lg" id="examSelect" required>
                                    <option value="">-- Choose Exam --</option>
                                    <option value="hy2025">Half Yearly 2025</option>
                                    <option value="year2025">Yearly 2025</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="classSelect" class="form-label fw-bold">Select Class</label>
                                <select class="form-select form-select-lg" id="classSelect" required disabled>
                                    <option value="">-- Choose Class --</option>
                                </select>
                            </div>

                            <div class="mb-3" id="subjectGroupDiv" style="display:none;">
                                <label for="subjectSelect" class="form-label fw-bold">Select Subject</label>
                                <select class="form-select form-select-lg" id="subjectSelect" disabled>
                                    <option value="">-- Choose Subject --</option>
                                </select>
                                <small class="text-muted">Only for Marks Entry. Not needed for View Marks.</small>
                            </div>

                            <div class="btn-group w-100 mb-3" role="group">
                                <button type="button" class="btn btn-outline-secondary active" 
                                        onclick="setMode('entry')" id="btnEntry">
                                    ✏️ Enter Marks
                                </button>
                                <button type="button" class="btn btn-outline-secondary" 
                                        onclick="setMode('view')" id="btnView">
                                    👁️ View Marks
                                </button>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Proceed
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
